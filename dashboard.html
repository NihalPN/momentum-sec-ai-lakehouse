<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum Intel Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.3);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
    </style>
</head>
<body class="font-sans min-h-screen antialiased">

    <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showFeedPage()">
                <i class="ph-fill ph-chart-line-up text-blue-500 text-2xl"></i>
                <span class="text-lg font-bold tracking-wider text-white">MOMENTUM<span class="text-blue-500">.LAKEHOUSE</span></span>
            </div>
            <div class="flex items-center gap-4 text-sm text-slate-400">
                <span class="flex items-center gap-1"><span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span> Terminal Active</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <div id="page-feed" class="space-y-6">
            <div class="flex flex-col gap-1">
                <h1 class="text-2xl font-extrabold text-white tracking-tight">Live Velocity Signals</h1>
                <p class="text-slate-400 text-sm">Real-time data stream parsed by automated LLM extractors.</p>
            </div>
            
            <div id="feed-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full text-center text-slate-500 py-12">
                    <i class="ph ph-circle-notch animate-spin text-2xl mb-2"></i>
                    <p>Polling Athena Lakehouse Catalog...</p>
                </div>
            </div>
        </div>

        <div id="page-detail" class="hidden space-y-6">
            <button onclick="showFeedPage()" class="flex items-center gap-2 text-sm font-semibold text-blue-400 hover:text-blue-300 transition-colors bg-slate-900 border border-slate-800 px-4 py-2 rounded-lg w-max">
                <i class="ph-bold ph-arrow-left"></i> Back to Live Feed
            </button>

            <div id="detail-container" class="grid grid-cols-1 gap-6">
                </div>
        </div>

    </main>

    <script>
        // ==========================================
        // 1. YOUR CLOUD ARCHITECTURE LINKS
        // ==========================================
        
        // The API that feeds the main dashboard grid
        const API_URL = "https://rluosesnkj.execute-api.us-east-1.amazonaws.com/sentiment"; 
        
        // 🛠️ ADDED: The direct link to your raw S3 bucket for the 50-page text files
        const RAW_BUCKET_BASE_URL = "https://momentum-intel-lakehouse-raw-stage.s3.amazonaws.com/";

        let globalSignalsCache = [];

        // Fetch primary data array from the serverless edge
        async function loadTerminalData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const result = await response.json();
                
                // Handle different JSON wrapper formats
                if (Array.isArray(result)) {
                    globalSignalsCache = result;
                } else if (result.data && Array.isArray(result.data)) {
                    globalSignalsCache = result.data;
                } else {
                    globalSignalsCache = [result]; // Fallback if API returns single object
                }
                
                renderFeedView(globalSignalsCache);
            } catch (error) {
                document.getElementById('feed-container').innerHTML = `
                    <div class="col-span-full p-4 bg-red-950/30 border border-red-900/50 rounded-lg text-red-400 text-sm">
                        <i class="ph-bold ph-warning-octagon"></i> Connection Failed. (${error.message})<br><br>
                        Verify your API Gateway URL is correct and deployed.
                    </div>`;
            }
        }

        // Render Page 1 Overview Grid
        function renderFeedView(items) {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-slate-500 py-12">No active momentum blocks detected.</p>`;
                return;
            }

            items.forEach((item, index) => {
                let sentimentClass = 'text-slate-400 border-slate-700 bg-slate-800';
                let sentimentLabel = 'NEUTRAL';
                if (item.momentum_sentiment > 0.1) {
                    sentimentClass = 'text-emerald-400 border-emerald-900/50 bg-emerald-950/30';
                    sentimentLabel = 'BULLISH';
                } else if (item.momentum_sentiment < -0.1) {
                    sentimentClass = 'text-rose-400 border-rose-900/50 bg-rose-950/30';
                    sentimentLabel = 'BEARISH';
                }

                const card = document.createElement('div');
                card.className = "glass-panel rounded-xl p-5 hover:border-slate-500 transition-all duration-200 flex flex-col justify-between group cursor-pointer shadow-md";
                card.onclick = () => showDetailPage(index);

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex flex-col gap-1">
                                <span class="text-2xl font-black text-white tracking-wider group-hover:text-blue-400 transition-colors">${item.ticker || 'UNKNOWN'}</span>
                                <span class="text-xs text-slate-500 font-mono"><i class="ph-fill ph-broadcast"></i> ${item.source_entity || 'SEC EDGAR 8-K'}</span>
                            </div>
                            <span class="px-2.5 py-1 rounded text-xs font-bold border ${sentimentClass}">
                                ${sentimentLabel} (${(item.momentum_sentiment || 0).toFixed(2)})
                            </span>
                        </div>
                        <p class="text-slate-300 text-sm line-clamp-3 mb-4 leading-relaxed">
                            ${item.ai_summary || 'No analytics generated.'}
                        </p>
                    </div>
                    <div class="pt-3 border-t border-slate-800/60 flex justify-between items-center text-xs font-mono text-slate-400">
                        <span><i class="ph-fill ph-target text-blue-500"></i> Conf: ${((item.confidence_score || 0) * 100).toFixed(0)}%</span>
                        <span class="text-blue-400 group-hover:underline flex items-center gap-0.5">Analyze Report <i class="ph ph-caret-right"></i></span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Navigate to View 2 (Full Individual Page)
        function showDetailPage(index) {
            const item = globalSignalsCache[index];
            if (!item) return;

            document.getElementById('page-feed').classList.add('hidden');
            document.getElementById('page-detail').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            let detailSentimentClass = 'text-slate-400 border-slate-800 bg-slate-900';
            let detailLabel = 'NEUTRAL CONFIGURATION';
            if (item.momentum_sentiment > 0.1) {
                detailSentimentClass = 'text-emerald-400 border-emerald-950 bg-emerald-950/30';
                detailLabel = 'BULLISH MOMENTUM';
            } else if (item.momentum_sentiment < -0.1) {
                detailSentimentClass = 'text-rose-400 border-rose-950 bg-rose-950/30';
                detailLabel = 'BEARISH MOMENTUM';
            }

            const downloadButtonHTML = item.download_url 
                ? `<a href="${item.download_url}" target="_blank" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold rounded shadow-lg transition-colors flex items-center gap-2">
                        <i class="ph-bold ph-download-simple"></i> Access Original File
                   </a>`
                : `<span class="text-xs text-slate-500 italic border border-slate-800 px-3 py-1 rounded">Secure Link Unavailable</span>`;

            const detailContainer = document.getElementById('detail-container');
            
            // 🛠️ REBUILT: Removed the old "original_text" logic and added an ID to the text container
            detailContainer.innerHTML = `
                <div class="glass-panel rounded-xl p-6 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                    <div class="space-y-1">
                        <div class="flex items-center gap-3">
                            <h2 class="text-4xl font-black text-white tracking-wider">${item.ticker || 'UNKNOWN'}</h2>
                            <span class="px-3 py-1 rounded text-sm font-bold border ${detailSentimentClass}">
                                ${detailLabel}
                            </span>
                        </div>
                        <p class="text-sm font-mono text-slate-400 flex items-center gap-4 mt-2">
                            <span><i class="ph-bold ph-broadcast text-blue-500"></i> Source: <strong>${item.source_entity || 'SEC EDGAR 8-K'}</strong></span>
                            <span><i class="ph-bold ph-fingerprint text-purple-500"></i> Confidence: <strong>${((item.confidence_score || 0) * 100).toFixed(0)}%</strong></span>
                        </p>
                    </div>
                    <div class="text-xs font-mono text-slate-500 border-t md:border-t-0 md:border-l border-slate-800 pt-4 md:pt-0 md:pl-6 max-w-md truncate">
                        <span class="block text-slate-400 font-bold uppercase tracking-wider mb-0.5">Lineage Locator</span>
                        <i class="ph-fill ph-hard-drive"></i> ${item.source_file || 'No source file logged.'}
                    </div>
                </div>

                <div class="glass-panel rounded-xl p-6 space-y-3 border-l-4 border-l-blue-500">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1.5">
                        <i class="ph-fill ph-cpu text-blue-500 text-sm"></i> Deep-Content Intelligence Analysis
                    </h3>
                    <p class="text-slate-100 text-base leading-relaxed tracking-wide font-normal">
                        ${item.ai_summary || 'No analysis generated.'}
                    </p>
                </div>

                <div class="glass-panel rounded-xl p-6 space-y-4">
                    <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1.5">
                            <i class="ph-fill ph-file-text text-amber-500 text-sm"></i> Unaltered Source Document
                        </h3>
                        ${downloadButtonHTML}
                    </div>
                    <div id="raw-text-container" class="p-5 rounded-lg bg-slate-950 border border-slate-800/80 text-slate-400 font-mono text-sm leading-loose whitespace-pre-wrap tracking-wide shadow-inner overflow-x-auto max-h-[500px]">
                        <span class="animate-pulse flex items-center gap-2">
                            <i class="ph ph-circle-notch animate-spin"></i> Fetching massive document from Lakehouse S3...
                        </span>
                    </div>
                </div>
            `;

            // 🛠️ ADDED: Trigger the S3 fetch dynamically if the lineage locator exists
            if (item.source_file) {
                fetchRawDocumentFromS3(item.source_file);
            } else {
                document.getElementById('raw-text-container').innerText = "Lineage Locator missing. Cannot fetch original document.";
            }
        }

        // 🛠️ ADDED: The asynchronous function that grabs the raw text from S3
        async function fetchRawDocumentFromS3(lineageLocator) {
            const container = document.getElementById('raw-text-container');
            try {
                const response = await fetch(RAW_BUCKET_BASE_URL + lineageLocator);
                if (!response.ok) throw new Error(`S3 returned HTTP ${response.status}`);
                
                const rawData = await response.json();
                
                // Parse out the text based on your SEC Python harvester schema
                const fullText = rawData.raw_text || rawData.text || JSON.stringify(rawData, null, 2);
                
                // Inject the loaded text
                container.innerText = fullText;
                container.classList.remove("text-slate-400");
                container.classList.add("text-slate-200"); // brighten text on load
            } catch (error) {
                console.error("[LAKEHOUSE ERROR]", error);
                container.innerText = `[ACCESS DENIED]\n\nFailed to fetch: ${lineageLocator}\n\nPlease ensure CORS is enabled on your raw S3 bucket.`;
                container.classList.add("text-red-400");
            }
        }

        // Return back to main layout view
        function showFeedPage() {
            document.getElementById('page-detail').classList.add('hidden');
            document.getElementById('page-feed').classList.remove('hidden');
        }

        // Initialize App Runtime
        loadTerminalData();
    </script>
</body>
</html>
